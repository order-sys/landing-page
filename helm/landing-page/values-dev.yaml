# =============================================================================
#  Dev environment overrides (merged on top of values.yaml).
#  Selected by the HelmRelease via: valuesFiles: [values.yaml, values-dev.yaml]
# =============================================================================

ingress:
  hosts:
    - test.syrianorder.com
  tlsSecret: landing-page-dev-tls
  clusterIssuer: letsencrypt-staging

replicaCount: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
