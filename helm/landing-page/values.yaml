image:
  repository: fadidasus/order-sys
  tag: "landing-page-cd1248d"
  pullPolicy: IfNotPresent

replicaCount: 1

# nginx-unprivileged starts instantly; surge=1 is safe
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# nginx-unprivileged listens on 8080 (not 80)
readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

service:
  port: 8080

ingress:
  hosts:
    - test.syrianorder.com
  tlsSecret: landing-page-tls
  clusterIssuer: letsencrypt-prod
