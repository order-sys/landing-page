name: Build and Push Image

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed to commit updated image tag back to this repo

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: fadidasus
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: fadidasus/order-sys
          tags: |
            type=sha,prefix=landing-page-,format=short

      - name: Build and push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          PRIMARY=$(echo "$TAGS" | head -1)
          docker build -t "$PRIMARY" .
          echo "$TAGS" | tail -n +2 | while read tag; do
            docker tag "$PRIMARY" "$tag"
          done
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "$TAGS" | while read tag; do
              docker push "$tag"
            done
          fi

      # Update the image tag in this repo's Helm chart values so Flux deploys the new version.
      # On 'dev' branch  → Flux dev  GitRepository picks this up → deploys to dev  namespace
      # On 'main' branch → Flux prod GitRepository picks this up → deploys to prod namespace
      - name: Update image tag and bump chart version
        if: github.event_name == 'push'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IMAGE_TAG=$(echo "$TAGS" | head -1 | cut -d: -f2)
          BRANCH="${GITHUB_REF_NAME}"
          echo "Deploying image tag: ${IMAGE_TAG} on branch: ${BRANCH}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase

          # Branch-scoped versioning: main → 0.1.x (prod), dev → 0.0.x (dev)
          # Independent minor versions per branch prevent merge conflicts entirely.
          if [ "$BRANCH" = "main" ]; then
            TARGET_MINOR=1
          else
            TARGET_MINOR=0
          fi

          sed -i "s|  tag:.*|  tag: \"${IMAGE_TAG}\"|" helm/landing-page/values.yaml

          CURRENT_VERSION=$(grep '^version:' helm/landing-page/Chart.yaml | awk '{print $2}')
          CURRENT_MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          CURRENT_PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # If minor matches our target series, bump patch. Otherwise reset patch to 0.
          if [ "$CURRENT_MINOR" = "$TARGET_MINOR" ]; then
            NEW_PATCH=$(( CURRENT_PATCH + 1 ))
          else
            NEW_PATCH=0
          fi
          NEW_VERSION="0.${TARGET_MINOR}.${NEW_PATCH}"

          sed -i "s|^version:.*|version: ${NEW_VERSION}|" helm/landing-page/Chart.yaml
          sed -i "s|^appVersion:.*|appVersion: \"${IMAGE_TAG}\"|" helm/landing-page/Chart.yaml

          git add helm/landing-page/values.yaml helm/landing-page/Chart.yaml
          git diff --cached --quiet || git commit -m "chore: release landing-page chart ${NEW_VERSION} with image ${IMAGE_TAG} [skip ci]"
          git push
